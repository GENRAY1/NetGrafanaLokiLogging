services:
  backend:
    build:
      context: .
      dockerfile: Client/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - Serilog__MinimumLevel__Default=Information
      - Serilog__MinimumLevel__Override__Microsoft=Warning
      - Serilog__MinimumLevel__Override__System=Warning
      - Serilog__WriteTo__1__Args__uri=http://loki:3100
      - Serilog__WriteTo__1__Args__labels__0__key=product
      - Serilog__WriteTo__1__Args__labels__0__value=my_product_2
      - Serilog__WriteTo__1__Args__labels__1__key=env
      - Serilog__WriteTo__1__Args__labels__1__value=staging
  grafana:
    image: grafana/grafana:13.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    depends_on:
      - loki

  loki:
    image: grafana/loki:2.9.0
    command:
      - -config.file=/etc/loki/config.yaml
      - -config.expand-env=true
    user: root
    environment:
      - LOKI_AWS_S3_URL=${LOKI_AWS_S3_URL}
      - LOKI_AWS_ENDPOINT=${LOKI_AWS_ENDPOINT}
      - LOKI_AWS_S3_FORCE_PATH_STYLE=${LOKI_AWS_S3_FORCE_PATH_STYLE}
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml
      - loki_data:/loki
      - loki_wal:/wal
    ports:
      - "3100:3100"
    depends_on:
      - minio

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${LOKI_S3_BUCKET}
      "

volumes:
  minio_data:
  loki_data:
  loki_wal:
